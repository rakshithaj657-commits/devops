<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

body{
    background:#111;
    color:white;
}

/* NAVBAR */
.nav{
    display:flex;
    justify-content:space-between;
    padding:15px 50px;
    position:fixed;
    width:100%;
    background:rgba(0,0,0,0.7);
    z-index:1000;
}

.logo{
    color:#e50914;
    font-size:28px;
    font-weight:bold;
}

.nav ul{
    display:flex;
    gap:20px;
    list-style:none;
    color:#ddd;
}

/* HERO SLIDER */
.hero{
    height:80vh;
    position:relative;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    opacity:0;
    transition:1s;
}

.slide.active{
    opacity:1;
}

.overlay{
    position:absolute;
    bottom:100px;
    left:60px;
}

.overlay h1{
    font-size:50px;
}

.overlay p{
    width:400px;
    color:#ccc;
}

.overlay button{
    margin-top:20px;
    padding:10px 20px;
    background:#e50914;
    border:none;
    color:white;
    cursor:pointer;
}

/* ROWS */
.row{
    margin:20px 40px;
}

.row h2{
    margin:10px 0;
}

.movies{
    display:flex;
    overflow-x:auto;
    gap:10px;
}

.movies::-webkit-scrollbar{
    display:none;
}

.card{
    min-width:160px;
    height:220px;
    border-radius:8px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card:hover{
    transform:scale(1.1);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">NETFLIX</div>
    <ul>
        <li>Home</li>
        <li>TV Shows</li>
        <li>Movies</li>
        <li>My List</li>
    </ul>
</div>

<!-- HERO SLIDER (3 REAL IMAGE BACKGROUNDS) -->
<div class="hero">

    <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');"></div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1509347528160-9a9e33742cdb');"></div>

    <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');"></div>

    <div class="overlay">
        <h1>Unlimited Movies & Series</h1>
        <p>Watch anywhere. Cancel anytime. Netflix clone UI built using HTML, CSS & JavaScript.</p>
        <button>▶ Play</button>
    </div>
</div>

<!-- ROW 1 -->
<div class="row">
    <h2>Trending Now</h2>
    <div class="movies">
        <div class="card"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1502139214982-d0ad755818d8"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1517602302552-471fe67acf66"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba"></div>
    </div>
</div>

<!-- ROW 2 -->
<div class="row">
    <h2>Top Rated</h2>
    <div class="movies">
        <div class="card"><img src="https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1517602302552-471fe67acf66"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1509347528160-9a9e33742cdb"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba"></div>
    </div>
</div>

<!-- ROW 3 -->
<div class="row">
    <h2>Action Movies</h2>
    <div class="movies">
        <div class="card"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1517602302552-471fe67acf66"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba"></div>
    </div>
</div>

<script>
/* HERO SLIDER AUTO CHANGE */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3000);
</script>

</body>
</html>
